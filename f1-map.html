<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-touch-icon.png">
  <link rel="shortcut icon" href="favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map — F1 Madrid | F1 Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    /* F1 Miami APP design — dark theme, teal accent */
    :root {
      --f1-bg: #0d0d0d;
      --f1-bg-card: #1a1a1a;
      --f1-bg-elevated: #242424;
      --f1-teal: #00C8C7;
      --f1-teal-dim: rgba(0, 200, 199, 0.15);
      --f1-text: #ffffff;
      --f1-text-muted: rgba(255, 255, 255, 0.7);
      --f1-border: rgba(255, 255, 255, 0.12);
      --f1-font: 'Montserrat', -apple-system, sans-serif;
      --elevation-sheet: 0 -4px 20px rgba(0,0,0,0.4);
    }
    html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
    body { font-family: var(--f1-font); background: var(--f1-bg); display: flex; justify-content: center; color: var(--f1-text); }
    .phone { width: 393px; max-width: 100vw; min-height: 100vh; background: var(--f1-bg); position: relative; display: flex; flex-direction: column; padding-bottom: 64px; }

    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: var(--f1-bg); border-bottom: 1px solid var(--f1-border);
      position: sticky; top: 0; z-index: 100;
    }
    .navbar .logo-link { text-decoration: none; display: flex; align-items: center; }
    .navbar .logo-link img { height: 38px; width: auto; display: block; object-fit: contain; filter: brightness(0) invert(1); }
    .navbar .nav-title { font-size: 18px; font-weight: 600; color: var(--f1-text); }
    .nav-icons { display: flex; align-items: center; gap: 20px; }
    .nav-icon-btn { all: unset; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; color: var(--f1-text); width: 24px; height: 24px; }
    .nav-icon-btn svg { height: 24px; width: auto; }

    .f1-map-area {
      width: 100%;
      height: 320px;
      background: var(--f1-bg-elevated);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--f1-text-muted);
      font-size: 14px;
    }
    .f1-map-area img { width: 100%; height: 100%; object-fit: cover; }

    .f1-map-chips {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      overflow-x: auto;
      scrollbar-width: none;
      background: var(--f1-bg);
      border-bottom: 1px solid var(--f1-border);
    }
    .f1-map-chips::-webkit-scrollbar { display: none; }
    .f1-map-chip {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 64px;
      border: 1px solid var(--f1-border);
      background: var(--f1-bg-card);
      font-size: 13px;
      font-weight: 500;
      color: var(--f1-text);
      cursor: pointer;
      font-family: var(--f1-font);
    }
    .f1-map-chip.active { border-color: var(--f1-teal); background: var(--f1-teal-dim); color: var(--f1-teal); }

    .f1-locations-sheet {
      flex: 1;
      background: var(--f1-bg-card);
      border-radius: 16px 16px 0 0;
      box-shadow: var(--elevation-sheet);
      padding: 16px;
      margin-top: -8px;
      position: relative;
      z-index: 1;
    }
    .f1-locations-sheet h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: var(--f1-text); }
    .f1-locations-search {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 45px;
      padding: 0 12px;
      border: 1px solid var(--f1-border);
      border-radius: 24px;
      margin-bottom: 16px;
      color: var(--f1-text-muted);
      background: var(--f1-bg-elevated);
    }
    .f1-locations-search svg { width: 20px; height: 20px; flex-shrink: 0; color: var(--f1-teal); }
    .f1-locations-search span { font-size: 14px; }
    .f1-locations-list { list-style: none; }
    .f1-locations-list li { border-bottom: 1px solid var(--f1-border); }
    .f1-locations-list a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      text-decoration: none;
      color: var(--f1-text);
      font-size: 15px;
      font-weight: 500;
    }
    .f1-locations-list a svg { width: 20px; height: 20px; color: var(--f1-teal); flex-shrink: 0; }
    .f1-locations-list a .chevron { margin-left: auto; color: var(--f1-text-muted); }

    .f1-bottom-nav {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 0 12px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: var(--f1-bg);
      border-top: 1px solid var(--f1-border);
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 393px;
      max-width: 100vw;
      z-index: 50;
    }
    .f1-bottom-nav a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      color: var(--f1-text-muted);
      text-decoration: none;
    }
    .f1-bottom-nav a.active { color: var(--f1-teal); }
    .f1-bottom-nav a svg { width: 24px; height: 24px; }
  </style>
</head>
<body>
  <div class="phone">
    <nav class="navbar">
      <a href="index.html" class="logo-link" aria-label="F1 Map"><img src="img/fever-logo.svg" alt="F1 Map"></a>
      <span class="nav-title">Map</span>
      <div class="nav-icons">
        <a href="profile.html" class="nav-icon-btn" aria-label="Profile"><svg viewBox="0 0 512 512" fill="currentColor"><path d="M406.5 399.6C387.4 352.9 341.5 320 288 320l-64 0c-53.5 0-99.4 32.9-118.5 79.6C69.9 362.2 48 311.7 48 256C48 141.1 141.1 48 256 48s208 93.1 208 208c0 55.7-21.9 106.2-57.5 143.6z"/></svg></a>
      </div>
    </nav>

    <div class="f1-map-area">
      <img src="img/map-madrid.png" alt="F1 Madrid circuit map" onerror="this.style.display='none';this.parentNode.innerHTML='Circuit map';">
    </div>

    <div class="f1-map-chips">
      <button type="button" class="f1-map-chip">Filter</button>
      <button type="button" class="f1-map-chip active">Fan Zones</button>
      <button type="button" class="f1-map-chip">Track Sessions</button>
      <button type="button" class="f1-map-chip">Entertainment</button>
      <button type="button" class="f1-map-chip">Food &amp; Drinks</button>
      <button type="button" class="f1-map-chip">Toilets</button>
      <button type="button" class="f1-map-chip">First Aid</button>
    </div>

    <div class="f1-locations-sheet">
      <h2>Locations</h2>
      <div class="f1-locations-search">
        <svg viewBox="0 0 512 512" fill="currentColor"><path d="M384 208A176 176 0 1 0 32 208a176 176 0 1 0 352 0zM343.3 366C307 397.2 259.7 416 208 416C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208c0 51.7-18.8 99-50 135.3L507.3 484.7c6.2 6.2 6.2 16.4 0 22.6s-16.4 6.2-22.6 0L343.3 366z"/></svg>
        <span>Search locations</span>
      </div>
      <ul class="f1-locations-list">
        <li><a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 3H6a2 2 0 00-2 2v14a2 2 0 002 2h4"/></svg>Fan Zones<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M9 18l6-6-6-6"/></svg></a></li>
        <li><a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17h14v-5l-7-7-7 7v5z"/></svg>Track Sessions<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M9 18l6-6-6-6"/></svg></a></li>
        <li><a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>Entertainment<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M9 18l6-6-6-6"/></svg></a></li>
        <li><a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 00-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>Food &amp; Drinks<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M9 18l6-6-6-6"/></svg></a></li>
        <li><a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Toilets<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M9 18l6-6-6-6"/></svg></a></li>
        <li><a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>First Aid<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M9 18l6-6-6-6"/></svg></a></li>
      </ul>
    </div>

    <nav class="f1-bottom-nav" aria-label="F1 App navigation">
      <a href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg>Home</a>
      <a href="f1-map.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>Map</a>
      <a href="f1-programme.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Programme</a>
      <a href="f1-merch.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 3H6a2 2 0 00-2 2v14a2 2 0 002 2h4"/></svg>Merch &amp; Food</a>
      <a href="f1-more.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>More</a>
    </nav>
  </div>

  <script>
    (function() {
      var chips = document.querySelectorAll('.f1-map-chip');
      chips.forEach(function(chip) {
        chip.addEventListener('click', function() {
          chips.forEach(function(c) { c.classList.remove('active'); });
          chip.classList.add('active');
        });
      });
    })();
  </script>
</body>
</html>
